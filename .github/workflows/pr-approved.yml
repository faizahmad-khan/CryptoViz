name: PR Approved

# ==========================================================================
# Posts a congratulatory comment when a PR review is APPROVED, but only
# when the review comes from the maintainer (MAINTAINER_USERNAME below).
# Reviews from other contributors, or reviews that are "commented" /
# "changes_requested", are ignored entirely.
# ==========================================================================

on:
  pull_request_review:
    types:
      - submitted

permissions:
  pull-requests: write

jobs:
  celebrate-approval:
    name: Celebrate maintainer approval
    runs-on: ubuntu-latest

    # ------------------------------------------------------------------
    # CONFIG BLOCK — edit these to update the maintainer handle / socials.
    # ------------------------------------------------------------------
    env:
      MAINTAINER_USERNAME: csxark
      MAINTAINER_NAME: Ark
      GITHUB_PROFILE_URL: https://github.com/csxark
      LINKEDIN_URL: https://www.linkedin.com/in/csxark
      PORTFOLIO_URL: https://csxark.xyz

    # Gate the entire job: only run for an approval, and only when the
    # reviewer is the maintainer. Everything else is skipped for free —
    # no wasted runner minutes, no comment posted.
    if: |
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'csxark'

    steps:
      - name: Post approval comment
        uses: actions/github-script@v9
        env:
          MAINTAINER_NAME: ${{ env.MAINTAINER_NAME }}
          GITHUB_PROFILE_URL: ${{ env.GITHUB_PROFILE_URL }}
          LINKEDIN_URL: ${{ env.LINKEDIN_URL }}
          PORTFOLIO_URL: ${{ env.PORTFOLIO_URL }}
          
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            const supportSection = [
              "### ❤️ Support CryptoViz",
              "",
              "⭐ Star the repository",
              `👤 Follow [${process.env.MAINTAINER_NAME}](${process.env.GITHUB_PROFILE_URL}) on GitHub`,
              `💼 [LinkedIn](${process.env.LINKEDIN_URL})`,
              `🌐 [Portfolio](${process.env.PORTFOLIO_URL})`,
            ].join("\n");

            const body = [
              `Great work @${author}, and thank you for your contribution! 🎉`,
              "",
              "I've reviewed the changes, and everything looks good. The requested fixes have been addressed correctly, and the implementation aligns well with the project requirements.",
              "",
              "✅ This Pull Request is ready to be merged.",
              "",
              "Looking forward to your future contributions!",
              "",
              supportSection
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
